name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  server:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: lam
          POSTGRES_PASSWORD: lam
          POSTGRES_DB: lam_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U lam"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: server/package-lock.json
      - run: npm ci
      - run: npx prisma generate
      - run: npm run typecheck
      - run: npm test
        env:
          TEST_DATABASE_URL: postgresql://lam:lam@localhost:5432/lam_test

  ai-service:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ai-service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      # Heavy inference deps (torch/ultralytics/rembg) aren't needed for the
      # unit suite — models are monkeypatched in tests.
      - run: pip install fastapi uvicorn python-multipart pillow numpy pytest httpx
      - run: python -m pytest tests -q

  app:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: app/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - name: Web export build check
        run: npx expo export --platform web
